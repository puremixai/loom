# Cargo mirror config for this project.
# Uses rsproxy.cn (China mirror) to avoid crates.io network timeouts.
# Project-local; does not affect your global ~/.cargo/config.toml.
# If you're outside CN or want the default, delete this file or set
# CARGO_NET_OFFLINE / override via env.
[source.crates-io]
replace-with = 'rsproxy-sparse'

[source.rsproxy]
registry = "https://rsproxy.cn/crates.io-index"

[source.rsproxy-sparse]
registry = "sparse+https://rsproxy.cn/index/"

[registries.rsproxy]
index = "https://rsproxy.cn/crates.io-index"

[net]
git-fetch-with-cli = true
